services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vps
      POSTGRES_PASSWORD: vps
      POSTGRES_DB: vps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
